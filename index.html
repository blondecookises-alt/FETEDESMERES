<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Le Calin Express — Blonde Cookie</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #faf9f5;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; touch-action: none;
    }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Palette ──────────────────────────────────────────────────
var BG      = '#faf9f5';   // fond crème-blanc
var NAVY    = '#000A89';   // bleu Blonde Cookie
var NAVY2   = '#0009a0';
var CREAM   = '#f7eddf';
var GOLD    = '#d4883a';
var GOLD2   = '#e8a050';
var PINK    = '#e8758f';
var CHOC    = '#5c3317';
var GRAY1   = '#555';
var GRAY2   = '#888';
var TXT     = '#0d0d2e';   // texte principal sombre
var TXTSUB  = '#5a5a7a';   // texte secondaire

// ─── Canvas ───────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var DPR    = Math.min(window.devicePixelRatio || 1, 2);
var W, H, GY;

function resize() {
  W = Math.min(window.innerWidth, 430);
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  GY = H - 72;
  initDots();
}
resize();
window.addEventListener('resize', resize);

// ─── roundRect portable ──────────────────────────────────────
function rrPath(x, y, w, h, r) {
  if (w < 1) w = 1;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,       y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r,   y,         r);
  ctx.closePath();
}

// ─── Dots bg (subtils sur fond clair) ────────────────────────
var dots = [];
function initDots() {
  dots = [];
  for (var i = 0; i < 20; i++) {
    dots.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*2+0.5,
      spd: Math.random()*0.35+0.15
    });
  }
}
function drawDots() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,10,137,0.05)';
  for (var i=0;i<dots.length;i++) {
    ctx.beginPath(); ctx.arc(dots[i].x, dots[i].y, dots[i].r, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function updateDots() {
  for (var i=0;i<dots.length;i++) {
    dots[i].x -= dots[i].spd;
    if (dots[i].x < -4) dots[i].x = W + 4;
  }
}

// ─── Ground ───────────────────────────────────────────────────
var scrollX = 0;
function drawGround() {
  ctx.strokeStyle = 'rgba(0,10,137,0.15)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();
  ctx.fillStyle = 'rgba(0,10,137,0.06)';
  var sp=24, off=scrollX%sp;
  for (var x=-off; x<W+sp; x+=sp) {
    ctx.beginPath(); ctx.arc(x,GY+9,1.5,0,Math.PI*2); ctx.fill();
  }
}

// ─── Cookie drawing ───────────────────────────────────────────
function drawCookie(cx, cy, r, isMama, leg) {
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath(); ctx.ellipse(0,r+3,r*.72,r*.17,0,0,Math.PI*2); ctx.fill();
  var col  = isMama ? '#c87941' : GOLD2;
  var edge = isMama ? '#a8602a' : GOLD;
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=edge; ctx.lineWidth=1.6; ctx.stroke();
  var chips = isMama
    ? [[-r*.32,-r*.32],[r*.28,-r*.18],[0,r*.26],[-r*.44,r*.14],[r*.38,r*.34]]
    : [[-r*.30,-r*.30],[r*.30,-r*.20],[0,r*.25],[-r*.42,r*.20]];
  ctx.fillStyle=CHOC;
  for (var i=0;i<chips.length;i++) {
    ctx.beginPath(); ctx.ellipse(chips[i][0],chips[i][1],r*.11,r*.08,0.3,0,Math.PI*2); ctx.fill();
  }
  var ey=-r*.14;
  ctx.fillStyle='#3a1f00';
  ctx.beginPath(); ctx.arc(-r*.27,ey,r*.09,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.27,ey,r*.09,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(-r*.23,ey-r*.02,r*.03,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.30,ey-r*.02,r*.03,0,Math.PI*2); ctx.fill();
  if (isMama) {
    ctx.strokeStyle='#3a1f00'; ctx.lineWidth=r*.09; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,r*.12,r*.36,.12,Math.PI-.12); ctx.stroke();
    ctx.fillStyle=PINK;
    ctx.beginPath(); ctx.ellipse(-r*.22,-r*1.04,r*.20,r*.12,-.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( r*.22,-r*1.04,r*.20,r*.12, .4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c05070';
    ctx.beginPath(); ctx.arc(0,-r*1.04,r*.09,0,Math.PI*2); ctx.fill();
    drawHeart(0,r*.46,r*.12,'#c05070');
    ctx.strokeStyle=edge; ctx.lineWidth=r*.19; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-r*.7,r*.1); ctx.lineTo(-r*1.2,-r*.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( r*.7,r*.1); ctx.lineTo( r*1.2,-r*.2); ctx.stroke();
  } else {
    ctx.strokeStyle='#3a1f00'; ctx.lineWidth=r*.08; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,r*.05,r*.27,.2,Math.PI-.2); ctx.stroke();
    var sw=Math.sin(leg)*9;
    ctx.strokeStyle=edge; ctx.lineWidth=r*.21; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-r*.28,r*.85); ctx.lineTo(-r*.28+sw,r*1.37); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( r*.28,r*.85); ctx.lineTo( r*.28-sw,r*1.37); ctx.stroke();
  }
  ctx.restore();
}
function drawHeart(x, y, s, col) {
  ctx.save(); ctx.translate(x,y); ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(0,s*.3);
  ctx.bezierCurveTo(-s*1.2,-s*.5,-s*2,s*.5,0,s*1.8);
  ctx.bezierCurveTo(s*2,s*.5,s*1.2,-s*.5,0,s*.3);
  ctx.fill(); ctx.restore();
}

// ─── Obstacles ────────────────────────────────────────────────
var OBS_TARGET = 30;
var OBS_DEF = [
  { type:'dumbbell',  w:30, h:56 },
  { type:'kettlebell',w:42, h:50 },
  { type:'barbell',   w:72, h:28 }
];
var obstacles=[], obsTimer=0, obsInterval=65, obsCount=0;

function spawnObs() {
  var def=OBS_DEF[Math.floor(Math.random()*OBS_DEF.length)];
  obstacles.push({ type:def.type, w:def.w, h:def.h, x:W+50, y:GY-def.h, counted:false });
}
function drawDumbbell(ox,oy) {
  var w=30,h=56; ctx.save(); ctx.translate(ox,oy);
  ctx.fillStyle=GRAY1; ctx.fillRect(-3,10,6,h-20);
  ctx.fillStyle=GRAY2;
  ctx.fillRect(-w/2,5,w,12); ctx.fillRect(-w/2,0,w,7);
  ctx.fillRect(-w/2,h-17,w,12); ctx.fillRect(-w/2,h-7,w,7);
  ctx.restore();
}
function drawKettlebell(ox,oy) {
  var r=18; ctx.save(); ctx.translate(ox,oy);
  ctx.strokeStyle=GRAY1; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,r*.5,r*.65,Math.PI*1.1,Math.PI*1.9); ctx.stroke();
  ctx.fillStyle=GRAY1; ctx.beginPath(); ctx.arc(0,r*1.5,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.arc(-r*.3,r*1.1,r*.28,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawBarbell(ox,oy) {
  var w=72,h=28; ctx.save(); ctx.translate(ox,oy);
  ctx.fillStyle=GRAY2; ctx.fillRect(-w/2+14,h/2-3,w-28,6);
  ctx.fillStyle=GRAY1;
  ctx.fillRect(-w/2,0,14,h); ctx.fillRect(w/2-14,0,14,h);
  ctx.fillStyle='#666';
  ctx.fillRect(-w/2+3,h*.1,8,h*.8); ctx.fillRect(w/2-11,h*.1,8,h*.8);
  ctx.restore();
}
function drawObstacle(o) {
  if      (o.type==='dumbbell')   drawDumbbell(o.x,o.y);
  else if (o.type==='kettlebell') drawKettlebell(o.x,o.y);
  else if (o.type==='barbell')    drawBarbell(o.x,o.y);
}
function checkCollision() {
  var pr=P.r*.70;
  for (var i=0;i<obstacles.length;i++) {
    var o=obstacles[i];
    var ox=o.x-o.w/2+5, ow=o.w-10, oy=o.y+4, oh=o.h-7;
    var nx=Math.max(ox,Math.min(P.x,ox+ow));
    var ny=Math.max(oy,Math.min(P.y,oy+oh));
    var dx=P.x-nx, dy=P.y-ny;
    if (dx*dx+dy*dy < pr*pr) return true;
  }
  return false;
}

// ─── Player & Mama ────────────────────────────────────────────
var P = { x:90, y:0, vy:0, r:22, onGround:true, leg:0 };
var MAMA = { x:0, y:0, r:32, visible:false };
var mamaSpawned=false, gameTime=0;

function resetGame() {
  P.y=GY-P.r; P.vy=0; P.onGround=true; P.leg=0;
  scrollX=0; obstacles=[]; obsTimer=0; obsInterval=65; obsCount=0;
  MAMA.x=W+100; MAMA.y=GY-MAMA.r; MAMA.visible=false;
  mamaSpawned=false; gameTime=0;
}
function doJump() {
  if (P.onGround) { P.vy=-11.8; P.onGround=false; }
}
function updateGame() {
  gameTime++; scrollX+=3.5;
  P.vy+=0.50; P.y+=P.vy;
  if (P.y>=GY-P.r) { P.y=GY-P.r; P.vy=0; P.onGround=true; }
  else              { P.onGround=false; }
  if (P.onGround) P.leg+=0.19;

  // Spawning (tant que 30 n'ont pas été passés)
  if (!mamaSpawned) {
    obsTimer++;
    if (obsTimer>=obsInterval) {
      spawnObs(); obsTimer=0;
      obsInterval=50+Math.floor(Math.random()*50); // 50-100 frames
    }
  }

  // Déplacement + comptage des obstacles passés
  for (var i=0;i<obstacles.length;i++) {
    obstacles[i].x -= 3.5;
    if (!obstacles[i].counted && obstacles[i].x+obstacles[i].w/2 < P.x) {
      obstacles[i].counted=true;
      obsCount++;
    }
  }
  obstacles=obstacles.filter(function(o){return o.x>-120;});

  // 30 obstacles passés → Maman apparaît
  if (obsCount>=OBS_TARGET && !mamaSpawned) {
    mamaSpawned=true; MAMA.visible=true; MAMA.x=W+80;
    obstacles=[];
  }
  if (MAMA.visible) {
    MAMA.x-=1.6;
    if (Math.abs(P.x-MAMA.x)<P.r+MAMA.r-12) {
      prizeType=''; prizeCode=''; codeCopied=false;
      wheelDone=false; wheelAngle=0; wheelSpinning=false;
      phase='wheel'; return;
    }
  }
  if (checkCollision()) phase='dead';
}

// ─── Wheel ────────────────────────────────────────────────────
var prizeType='', prizeCode='', codeCopied=false;
var wheelAngle=0, wheelSpinning=false, wheelDone=false;
var wheelStart=0, wheelFrom=0, wheelTo=0;
var SPIN_DUR=4200;
var SEGS=[
  { type:'lose',   labels:['Pas de','chance'], bg:'#ececf5', fg:TXTSUB  },
  { type:'maman5', labels:['-5%','déduit'],    bg:GOLD,      fg:'#fff'  },
  { type:'lose',   labels:['Pas de','chance'], bg:'#ececf5', fg:TXTSUB  },
  { type:'cookie', labels:['Cookie','Maman'],  bg:PINK,      fg:'#fff'  },
  { type:'lose',   labels:['Pas de','chance'], bg:'#ececf5', fg:TXTSUB  },
  { type:'maman5', labels:['-5%','déduit'],    bg:GOLD,      fg:'#fff'  },
  { type:'lose',   labels:['Pas de','chance'], bg:'#ececf5', fg:TXTSUB  },
  { type:'cookie', labels:['Cookie','Maman'],  bg:PINK,      fg:'#fff'  },
];
function easeOut3(t){return 1-Math.pow(1-t,3);}
function startSpin() {
  if (wheelSpinning||wheelDone) return;
  var rand=Math.random(),seg;
  if      (rand<0.50){prizeType='lose';  seg=[0,2,4,6][Math.floor(Math.random()*4)];prizeCode='';}
  else if (rand<0.75){prizeType='maman5';seg=Math.random()<.5?1:5;
    prizeCode='MAMAN5'+Math.random().toString(36).substr(2,4).toUpperCase();}
  else               {prizeType='cookie';seg=Math.random()<.5?3:7;
    prizeCode='MAMAN'+Math.random().toString(36).substr(2,5).toUpperCase();}
  var segC=(seg+0.5)*Math.PI/4;
  var base=-Math.PI/2-segC;
  var delta=((base-wheelAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  wheelFrom=wheelAngle; wheelTo=wheelAngle+6*Math.PI*2+delta;
  wheelStart=performance.now(); wheelSpinning=true;
}
function updateWheel(now) {
  if (!wheelSpinning) return;
  var t=Math.min((now-wheelStart)/SPIN_DUR,1);
  wheelAngle=wheelFrom+(wheelTo-wheelFrom)*easeOut3(t);
  if (t>=1){wheelSpinning=false;wheelDone=true;wheelAngle=wheelTo;
    setTimeout(function(){phase='result';},900);}
}
function drawWheel(cx,cy,rad) {
  var n=SEGS.length, arc=(Math.PI*2)/n;
  ctx.save(); ctx.translate(cx,cy);
  for (var i=0;i<n;i++) {
    var a0=wheelAngle+i*arc,a1=a0+arc,seg=SEGS[i];
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,rad,a0,a1);ctx.closePath();
    ctx.fillStyle=seg.bg;ctx.fill();
    ctx.strokeStyle='rgba(0,10,137,0.12)';ctx.lineWidth=1.2;ctx.stroke();
    var mid=a0+arc/2;
    ctx.save();
    ctx.translate(Math.cos(mid)*rad*.64,Math.sin(mid)*rad*.64);
    ctx.rotate(mid+Math.PI/2);
    ctx.fillStyle=seg.fg;
    ctx.font='600 '+Math.round(rad*.1)+'px Inter,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(var j=0;j<seg.labels.length;j++){
      ctx.fillText(seg.labels[j],0,(j-(seg.labels.length-1)/2)*rad*.14);
    }
    ctx.restore();
  }
  // cerclage bleu
  ctx.beginPath();ctx.arc(0,0,rad,0,Math.PI*2);
  ctx.strokeStyle=NAVY;ctx.lineWidth=2.5;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,rad*.10,0,Math.PI*2);ctx.fillStyle=NAVY;ctx.fill();
  ctx.beginPath();ctx.arc(0,0,rad*.055,0,Math.PI*2);ctx.fillStyle=BG;ctx.fill();
  // pointer
  ctx.fillStyle=NAVY;
  ctx.beginPath();ctx.moveTo(0,-rad-3);ctx.lineTo(-9,-rad+13);ctx.lineTo(9,-rad+13);
  ctx.closePath();ctx.fill();
  ctx.restore();
}

// ─── UI helpers ───────────────────────────────────────────────
function drawCard(x, y, w, h, r) {
  rrPath(x, y, w, h, r);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  ctx.strokeStyle=NAVY; ctx.lineWidth=1.2; ctx.stroke();
}
function drawBtn(label, cx, cy, bw, bh, bg, fg) {
  rrPath(cx-bw/2, cy-bh/2, bw, bh, bh/2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var fs=15; ctx.font='600 '+fs+'px Inter,sans-serif';
  while(ctx.measureText(label).width>bw-20&&fs>10){fs--;ctx.font='600 '+fs+'px Inter,sans-serif';}
  ctx.fillStyle=fg; ctx.fillText(label,cx,cy);
  return {x:cx-bw/2, y:cy-bh/2, w:bw, h:bh};
}
function drawBtnOutline(label, cx, cy, bw, bh, col) {
  rrPath(cx-bw/2, cy-bh/2, bw, bh, bh/2);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var fs=13; ctx.font='500 '+fs+'px Inter,sans-serif';
  while(ctx.measureText(label).width>bw-18&&fs>9){fs--;ctx.font='500 '+fs+'px Inter,sans-serif';}
  ctx.fillStyle=col; ctx.fillText(label,cx,cy);
  return {x:cx-bw/2, y:cy-bh/2, w:bw, h:bh};
}
function hit(b) {
  return b && tapX>=b.x&&tapX<=b.x+b.w&&tapY>=b.y&&tapY<=b.y+b.h;
}
function countdown() {
  var dl=new Date('2026-05-24T00:00:00'),diff=Math.max(0,dl-Date.now());
  return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),
         m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
}

// ─── Input ────────────────────────────────────────────────────
var tapped=false,tapX=0,tapY=0;
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  var r=canvas.getBoundingClientRect();
  tapped=true;tapX=e.clientX-r.left;tapY=e.clientY-r.top;
},{passive:false});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();tapped=true;tapX=W/2;tapY=H/2;}
});

// ─── Phase ────────────────────────────────────────────────────
var phase='home';

// ═══════════════════════════════════════════════════════════════
// ÉCRANS
// ═══════════════════════════════════════════════════════════════

// ── HOME ──────────────────────────────────────────────────────
var hBtn, homeF=0;
function drawHome() {
  homeF++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots();
  var mx=W/2, pad=24;

  // ── Brand ──
  ctx.fillStyle=NAVY;
  ctx.font="700 19px 'Playfair Display',Georgia,serif";
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('BLONDE COOKIE', mx, 46);
  ctx.fillStyle=TXTSUB; ctx.font='400 10px Inter,sans-serif';
  ctx.fillText('FETE DES MERES 2026', mx, 63);

  // séparateur
  ctx.strokeStyle='rgba(0,10,137,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad,72); ctx.lineTo(W-pad,72); ctx.stroke();

  // ── Titre ──
  ctx.fillStyle=TXT;
  ctx.font="bold 30px 'Playfair Display',Georgia,serif";
  ctx.fillText('Le Calin Express', mx, 110);

  ctx.font='24px sans-serif'; ctx.textBaseline='middle';
  ctx.fillText('\u{1F495}', mx, 132);

  // ── Description ──
  ctx.fillStyle=TXTSUB; ctx.font='400 13px Inter,sans-serif'; ctx.textBaseline='alphabetic';
  ctx.fillText('Guide le cookie jusqu\'a sa maman,', mx, 162);
  ctx.fillText('passe 30 obstacles et gagne ton code !', mx, 180);

  // ── Badges récompenses ──
  var bY=198, bH=40, bW=Math.floor((W-pad*2-10)/2);
  // gauche : -5%
  drawCard(pad, bY, bW, bH, 10);
  ctx.fillStyle=GOLD; ctx.font='600 12px Inter,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('-5% sur commande', pad+bW/2, bY+bH/2);
  // droite : cookie
  drawCard(pad+bW+10, bY, bW, bH, 10);
  ctx.fillStyle=PINK; ctx.font='600 12px Inter,sans-serif';
  ctx.fillText('Cookie Maman offert', pad+bW+10+bW/2, bY+bH/2);

  // ── Compte à rebours ──
  var cty=252, cbH=62;
  drawCard(pad, cty, W-pad*2, cbH, 12);
  ctx.fillStyle=TXTSUB; ctx.font='400 9px Inter,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText("Offre valable jusqu'au 23 mai 2026", mx, cty+13);
  var cd=countdown();
  var blocks=[{v:cd.d,l:'j'},{v:cd.h,l:'h'},{v:cd.m,l:'m'},{v:cd.s,l:'s'}];
  var bwc=Math.floor((W-pad*2-20)/4), bx0=pad+10;
  for(var bi=0;bi<blocks.length;bi++){
    var bx=bx0+bi*bwc+bwc/2;
    ctx.fillStyle=NAVY; ctx.font='700 22px Inter,sans-serif'; ctx.textBaseline='middle';
    ctx.fillText(String(blocks[bi].v).padStart(2,'0'),bx,cty+40);
    ctx.fillStyle=TXTSUB; ctx.font='400 9px Inter,sans-serif'; ctx.textBaseline='alphabetic';
    ctx.fillText(blocks[bi].l,bx,cty+56);
    if(bi<3){ctx.fillStyle='rgba(0,10,137,0.25)';ctx.font='700 14px Inter,sans-serif';
      ctx.textBaseline='middle'; ctx.fillText(':',bx+bwc/2,cty+38);}
  }

  // ── Aperçu animé ──
  var previewY=Math.min(H-190,338);
  var bounce=Math.sin(homeF*.09)*5;
  drawCookie(mx-36,previewY+bounce,19,false,homeF*.20);
  ctx.fillStyle='rgba(0,10,137,0.25)'; ctx.font='13px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('- - →',mx+2,previewY+2);
  drawHeart(mx+20,previewY-4,8,PINK);
  drawCookie(mx+48,previewY,25,true,0);

  // ── Bouton ──
  hBtn=drawBtn('Jouer maintenant',mx,H-92,230,52,NAVY,CREAM);
  ctx.fillStyle=TXTSUB; ctx.font='400 10px Inter,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('1 code par personne · 1 seule commande',mx,H-52);
}

// ── EXPLAIN ───────────────────────────────────────────────────
var eBtn;
function drawExplain() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots();
  var mx=W/2, pad=24;

  ctx.fillStyle=NAVY;
  ctx.font="700 22px 'Playfair Display',Georgia,serif";
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('Comment jouer ?',mx,66);

  var steps=[
    {icon:'\u{1F446}',txt:"Tape l'ecran pour sauter"},
    {icon:'\u{1F3CB}',txt:'Evite les halteres !'},
    {icon:'\u{1F3AF}',txt:'Passe 30 obstacles'},
    {icon:'\u{1F495}',txt:'Rejoins Maman Cookie'},
    {icon:'\u{1F3A1}',txt:'Tourne la roue et gagne'},
  ];
  for(var si=0;si<steps.length;si++){
    var sy=88+si*68,cardH=54;
    drawCard(pad,sy,W-pad*2,cardH,12);
    ctx.font='20px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(steps[si].icon,pad+16,sy+cardH/2);
    ctx.fillStyle=TXT; ctx.font='400 13px Inter,sans-serif';
    ctx.fillText(steps[si].txt,pad+52,sy+cardH/2);
  }

  // badge 30 obstacles
  var badgeY=442;
  rrPath(mx-90,badgeY,180,30,15);
  ctx.fillStyle=NAVY; ctx.fill();
  ctx.fillStyle=CREAM; ctx.font='600 12px Inter,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Objectif : 30 obstacles !',mx,badgeY+15);

  eBtn=drawBtn("C'est parti !",mx,H-76,210,52,NAVY,CREAM);
}

// ── PLAYING ───────────────────────────────────────────────────
function drawPlaying() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots(); updateDots();
  drawGround();

  // ── Barre de progression ──
  var pad=24, pbY=14, pbH=28, pbW=W-pad*2;
  drawCard(pad, pbY, pbW, pbH, pbH/2);

  // remplissage progression
  var prog=Math.min(obsCount/OBS_TARGET,1);
  if(prog>0){
    var fillW=Math.max(pbH,(pbW-2)*prog);
    rrPath(pad+1, pbY+1, fillW, pbH-2, (pbH-2)/2);
    ctx.fillStyle=NAVY; ctx.fill();
  }

  // texte "X / 30"
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var txColor = prog>0.45 ? CREAM : NAVY;
  ctx.fillStyle=txColor;
  ctx.font='600 11px Inter,sans-serif';
  ctx.fillText(obsCount+' / 30 obstacles',mx,pbY+pbH/2);

  var mx=W/2;

  for(var oi=0;oi<obstacles.length;oi++) drawObstacle(obstacles[oi]);
  if(MAMA.visible) drawCookie(MAMA.x,MAMA.y,MAMA.r,true,0);
  drawCookie(P.x,P.y,P.r,false,P.leg);

  if(gameTime<100){
    ctx.fillStyle=TXTSUB; ctx.font='11px Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('Tap pour sauter !',mx,H-26);
  }
}

// ── DEAD ──────────────────────────────────────────────────────
var dBtn;
function drawDead() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots(); drawGround();
  drawCookie(P.x,P.y,P.r,false,0);
  ctx.fillStyle='rgba(250,249,245,0.82)'; ctx.fillRect(0,0,W,H);
  var mx=W/2, my=H/2, pad=30;

  drawCard(pad,my-110,W-pad*2,200,20);

  ctx.font='40px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('\u{1F62C}',mx,my-62);
  ctx.fillStyle=NAVY;
  ctx.font="700 22px 'Playfair Display',Georgia,serif"; ctx.textBaseline='alphabetic';
  ctx.fillText('Oups !',mx,my-18);
  ctx.fillStyle=TXTSUB; ctx.font='400 12px Inter,sans-serif';
  ctx.fillText('Le cookie n\'a pas reussi a passer',mx,my+8);
  ctx.fillText('les '+obsCount+' / 30 obstacles...',mx,my+26);
  ctx.fillStyle='rgba(0,10,137,0.2)'; ctx.font='11px Inter,sans-serif';
  ctx.fillText('Essaie encore, tu peux le faire !',mx,my+50);

  dBtn=drawBtn('Reessayer !',mx,my+86,190,48,NAVY,CREAM);
  ctx.fillStyle=TXTSUB; ctx.font='10px Inter,sans-serif';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Tap ailleurs pour revenir',mx,my+148);
}

// ── WHEEL SCREEN ──────────────────────────────────────────────
var wBtn;
function drawWheelScreen(now) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots();
  var mx=W/2, t=now/1000;

  ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  var stars=['✨','🌟','💫','✨','🌸','⭐'];
  for(var si=0;si<6;si++){
    ctx.globalAlpha=0.5+Math.sin(t*1.8+si)*.3;
    ctx.fillText(stars[si],mx+Math.cos(t*.8+si*1.05)*130,168+Math.sin(t*.6+si*1.05)*28);
  }
  ctx.globalAlpha=1;

  ctx.fillStyle=NAVY;
  ctx.font="700 21px 'Playfair Display',Georgia,serif";
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('30 obstacles passes !',mx,58);
  ctx.fillStyle=TXTSUB; ctx.font='400 12px Inter,sans-serif';
  ctx.fillText('Le cookie retrouve sa Maman !',mx,78);
  ctx.fillText('Tourne la roue pour ta surprise.',mx,96);

  updateWheel(now);
  drawWheel(mx,250,Math.min(mx-28,126));

  if(!wheelSpinning&&!wheelDone){
    wBtn=drawBtn('Tourner la roue !',mx,H-84,210,52,NAVY,CREAM);
  }else if(wheelSpinning){
    ctx.fillStyle=TXTSUB; ctx.font='12px Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('La roue tourne...',mx,H-70);
    wBtn=null;
  }else{wBtn=null;}
}

// ── RESULT ────────────────────────────────────────────────────
var copyBtn, orderBtn, replayBtn;
function drawResult() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawDots();
  var mx=W/2, pad=24;
  ctx.textAlign='center';

  if(prizeType==='lose'){
    // ── PERTE ──
    var cardY=80, cardH=260;
    drawCard(pad, cardY, W-pad*2, cardH, 20);

    ctx.font='44px sans-serif'; ctx.textBaseline='middle';
    ctx.fillText('\u{1F614}',mx,cardY+54);
    ctx.fillStyle=NAVY;
    ctx.font="700 22px 'Playfair Display',Georgia,serif"; ctx.textBaseline='alphabetic';
    ctx.fillText('Pas de chance...',mx,cardY+106);
    ctx.fillStyle=TXTSUB; ctx.font='400 12px Inter,sans-serif';
    ctx.fillText('La roue ne t\'a pas souri cette fois.',mx,cardY+130);
    ctx.fillText('Merci d\'avoir joue !',mx,cardY+150);

    ctx.strokeStyle='rgba(0,10,137,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mx-50,cardY+170); ctx.lineTo(mx+50,cardY+170); ctx.stroke();

    drawHeart(mx-16,cardY+190,9,'rgba(232,117,143,0.45)');
    drawHeart(mx,   cardY+185,11,'rgba(232,117,143,0.55)');
    drawHeart(mx+16,cardY+190,9,'rgba(232,117,143,0.45)');

    replayBtn=drawBtn('Rejouer',mx,H-76,178,50,NAVY,CREAM);
    copyBtn=null; orderBtn=null;

  }else{
    // ── VICTOIRE — layout en flux, pas de pinning ──
    var isMaman5=(prizeType==='maman5');
    var accent=isMaman5?GOLD:PINK;
    var curY=16;

    // ── Carte principale ──
    var cardH=182;
    drawCard(pad,curY,W-pad*2,cardH,18);

    ctx.font='36px sans-serif'; ctx.textBaseline='middle';
    ctx.fillText(isMaman5?'\u{1F389}':'\u{1F36A}',mx,curY+38);
    ctx.fillStyle=NAVY;
    ctx.font="700 22px 'Playfair Display',Georgia,serif"; ctx.textBaseline='alphabetic';
    ctx.fillText('Felicitations !',mx,curY+88);
    ctx.fillStyle=accent; ctx.font='600 13px Inter,sans-serif';
    ctx.fillText(isMaman5?'-5% sur ta commande':'1 cookie Maman offert !',mx,curY+112);

    ctx.fillStyle=TXTSUB; ctx.font='400 10px Inter,sans-serif';
    ctx.fillText('Ton code unique :',mx,curY+136);
    // code box (intérieur carte)
    rrPath(pad+14,curY+144,W-pad*2-28,40,9);
    ctx.fillStyle=BG; ctx.fill();
    ctx.strokeStyle=accent; ctx.lineWidth=1.8; ctx.stroke();
    ctx.fillStyle=TXT; ctx.font='bold 19px Courier New,monospace'; ctx.textBaseline='middle';
    ctx.fillText(prizeCode,mx,curY+164);

    curY+=cardH+12;

    // ── Bouton copier ──
    copyBtn=drawBtn(codeCopied?'✓ Code copie !':'Copier le code',mx,curY+22,200,42,accent,'#fff');
    curY+=42+16;

    // ── CTA commander ──
    rrPath(pad,curY,W-pad*2,50,14);
    ctx.fillStyle=NAVY; ctx.fill();
    orderBtn={x:pad, y:curY, w:W-pad*2, h:50};
    ctx.fillStyle=CREAM; ctx.font='600 15px Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Commander sur le site →',mx,curY+25);
    curY+=50+12;

    // ── Encadré instructions ──
    var instrH=76;
    rrPath(pad,curY,W-pad*2,instrH,12);
    ctx.fillStyle='rgba(0,10,137,0.05)'; ctx.fill();
    ctx.strokeStyle='rgba(0,10,137,0.18)'; ctx.lineWidth=1; ctx.stroke();

    ctx.fillStyle=TXT; ctx.font='500 12px Inter,sans-serif'; ctx.textBaseline='alphabetic';
    ctx.fillText('Indique ton code dans le champ',mx,curY+20);
    ctx.fillStyle=NAVY; ctx.font='600 13px Inter,sans-serif';
    ctx.fillText('"Message" lors du paiement.',mx,curY+38);
    ctx.strokeStyle='rgba(0,10,137,0.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad+20,curY+48); ctx.lineTo(W-pad-20,curY+48); ctx.stroke();
    ctx.fillStyle=TXTSUB; ctx.font='400 10px Inter,sans-serif';
    ctx.fillText('1 code par personne · 1 seule commande',mx,curY+62);
    curY+=instrH+8;

    if(!isMaman5){
      ctx.fillStyle=TXTSUB; ctx.font='400 10px Inter,sans-serif';
      ctx.fillText('Sur presentation en boutique ou commande.',mx,curY+14);
      curY+=24;
    }

    curY+=20;
    replayBtn=drawBtnOutline('Rejouer',mx,curY+18,120,36,TXTSUB);
  }
}

// ═══════════════════════════════════════════════════════════════
// BOUCLE PRINCIPALE
// ═══════════════════════════════════════════════════════════════
var mx; // déclaré globalement pour drawPlaying
function loop(now) {
  requestAnimationFrame(loop);

  if(tapped){
    if      (phase==='home')    { if(hit(hBtn)) phase='explain'; }
    else if (phase==='explain') { if(hit(eBtn)){resetGame();phase='playing';} }
    else if (phase==='playing') { doJump(); }
    else if (phase==='dead')    {
      if(hit(dBtn)){resetGame();phase='playing';}
      else phase='home';
    }
    else if (phase==='wheel')   { if(hit(wBtn)) startSpin(); }
    else if (phase==='result')  {
      if(hit(copyBtn)){
        if(navigator.clipboard) navigator.clipboard.writeText(prizeCode).catch(function(){});
        codeCopied=true;
      }else if(hit(orderBtn)){
        // Méthode fiable sur Safari iOS
        var a=document.createElement('a');
        a.href='https://blondecookises-alt.github.io/Carte/';
        a.target='_blank'; a.rel='noopener noreferrer';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }else if(hit(replayBtn)){
        prizeType='';prizeCode='';codeCopied=false;
        wheelDone=false;wheelAngle=0;wheelSpinning=false;
        phase='home';
      }
    }
    tapped=false;
  }

  switch(phase){
    case 'home':    drawHome();    break;
    case 'explain': drawExplain(); break;
    case 'playing': updateGame();  drawPlaying(); break;
    case 'dead':    drawDead();    break;
    case 'wheel':   drawWheelScreen(now); break;
    case 'result':  drawResult();  break;
  }
}
requestAnimationFrame(loop);
</script>
